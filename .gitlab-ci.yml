variables:
  GIT_SUBMODULE_STRATEGY: "recursive"
  VCPKG_DISABLE_METRICS: "1"

stages:
  - build
  - deploy

.setup_ubuntu_environment:
  variables:
    DEBIAN_FRONTEND: "noninteractive"
  image: ubuntu:jammy
  before_script:
    - apt -y update
    - apt -y install build-essential cmake git curl zip unzip tar pkg-config ninja-build python3 python3-jinja2 autoconf automake autoconf-archive libtool bison libltdl-dev libx11-dev libxft-dev libxext-dev libwayland-dev libxkbcommon-dev libegl1-mesa-dev libxtst-dev libibus-1.0-dev libxtst-dev libxi-dev libxrandr-dev libgles2-mesa-dev linux-libc-dev wx-common
    - git clone https://github.com/microsoft/vcpkg.git
    - cd vcpkg
    - ./bootstrap-vcpkg.sh
    - export VCPKG_ROOT=$(pwd)
    - export PATH=$VCPKG_ROOT:$PATH
    - cd ..

build-ubuntu-x64-debug:
  extends: .setup_ubuntu_environment
  stage: build
  script:
    - mkdir build
    - cmake -S . -B build -DCMAKE_TOOLCHAIN_FILE=${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake --preset "linux-x64-debug" -DCMAKE_MAKE_PROGRAM=/usr/bin/ninja
    - cd build
    - cmake --build .
    - find
    - cd ..
  tags:
    - kgr1-instance-extraordinary
  artifacts:
    name: HIT_64_Ubuntu_Debug_%CI_COMMIT_REF_SLUG%_%CI_COMMIT_SHA%
    when: on_success
    expire_in: 1 weeks
    paths:
      - build/HITgui/HITgui

build-ubuntu-x64-release:
  extends: .setup_ubuntu_environment
  stage: build
  variables:
    VCPKG_BUILD_TYPE: "release"
  script:
    - mkdir build
    - cmake -S . -B build -DCMAKE_TOOLCHAIN_FILE=${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake --preset "linux-x64-release" -DCMAKE_MAKE_PROGRAM=/usr/bin/ninja
    - cd build
    - cmake --build .
    - find
    - cd ..
  tags:
    - kgr1-instance-extraordinary
  artifacts:
    name: HIT_64_Ubuntu_Release_%CI_COMMIT_REF_SLUG%_%CI_COMMIT_SHA%
    when: on_success
    expire_in: 1 weeks
    paths:
      - build/HITgui/HITgui

deploy-ubuntu-x64-release:
  image: ubuntu:rolling
  needs:
    - job: "build-ubuntu-x64-release"
      artifacts: true
  stage: deploy
  before_script:
    - apt -y update
    - apt -y install curl
  script:
    - "curl --location --header \"JOB-TOKEN: ${CI_JOB_TOKEN}\" --upload-file build/HITgui/HITgui \"${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/HIT/${CI_COMMIT_TAG}/HITgui\""
  tags:
    - kgr1-instance-standard
  only:
    - tags



.setup_windows_environment:
  before_script:
    - invoke-expression "& 'C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\Launch-VsDevShell.ps1'"
    - vcpkg.exe integrate install

build-windows-x64-debug:
  extends: .setup_windows_environment
  stage: build
  script:
    - msbuild /m /nr:false HRTImagingTool.sln /p:Platform=x64 /p:Configuration=Debug
    - invoke-expression "& 'C:\Program Files\7-Zip\7z.exe' a ${CI_PROJECT_NAME}_${CI_COMMIT_REF_NAME}_${CI_COMMIT_SHORT_SHA}_${CI_PIPELINE_ID}_${CI_JOB_ID}_Debug.7z Debug"
    - echo "put ${CI_PROJECT_NAME}_${CI_COMMIT_REF_NAME}_${CI_COMMIT_SHORT_SHA}_${CI_PIPELINE_ID}_${CI_JOB_ID}_Debug.7z" > upload.txt
    - echo quit >> upload.txt
    - ftp -A -s:upload.txt 127.0.0.1
  tags:
    - windows64
    - visual-studio-2022
  artifacts:
    name: HIT_64_Windows_Debug_%CI_COMMIT_REF_SLUG%_%CI_COMMIT_SHA%
    when: on_success
    expire_in: 1 weeks
    paths:
      - Debug/

build-windows-x64-release:
  extends: .setup_windows_environment
  stage: build
  script:
    - msbuild /m /nr:false HRTImagingTool.sln /p:Platform=x64 /p:Configuration=Release
    - invoke-expression "& 'C:\Program Files\7-Zip\7z.exe' a ${CI_PROJECT_NAME}_${CI_COMMIT_REF_NAME}_${CI_COMMIT_SHORT_SHA}_${CI_PIPELINE_ID}_${CI_JOB_ID}_Release.7z Release"
    - echo "put ${CI_PROJECT_NAME}_${CI_COMMIT_REF_NAME}_${CI_COMMIT_SHORT_SHA}_${CI_PIPELINE_ID}_${CI_JOB_ID}_Release.7z" > upload.txt
    - echo quit >> upload.txt
    - ftp -A -s:upload.txt 127.0.0.1
  tags:
    - windows64
    - visual-studio-2022
  artifacts:
    name: HIT_64_Windows_Release_%CI_COMMIT_REF_SLUG%_%CI_COMMIT_SHA%
    when: on_success
    expire_in: 1 weeks
    paths:
      - Release/

deploy-windows-x64-release:
  needs:
    - job: "build-windows-x64-release"
      artifacts: true
  stage: deploy
  script:
    - "C:\\gitlab-runner\\curl-8.14.1_3-win64-mingw\\bin\\curl.exe --location --header \"JOB-TOKEN: ${CI_JOB_TOKEN}\" --upload-file Release/HITgui.exe \"${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/HIT/${CI_COMMIT_TAG}/HITgui.exe\""
  tags:
    - windows64
    - visual-studio-2022
  only:
    - tags
