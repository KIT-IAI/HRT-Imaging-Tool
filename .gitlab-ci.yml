variables:
  GIT_SUBMODULE_STRATEGY: recursive

stages:
  - build
  - deploy

build-windows-x64-debug:
  stage: build
  script:
    - invoke-expression "& 'C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\Launch-VsDevShell.ps1'"
    - vcpkg.exe integrate install
    - msbuild /m /nr:false HRTImagingTool.sln /p:Platform=x64 /p:Configuration=Debug
    - invoke-expression "& 'C:\Program Files\7-Zip\7z.exe' a ${CI_PROJECT_NAME}_${CI_COMMIT_REF_NAME}_${CI_COMMIT_SHORT_SHA}_${CI_PIPELINE_ID}_${CI_JOB_ID}_Debug.7z Debug"
    - echo "put ${CI_PROJECT_NAME}_${CI_COMMIT_REF_NAME}_${CI_COMMIT_SHORT_SHA}_${CI_PIPELINE_ID}_${CI_JOB_ID}_Debug.7z" > upload.txt
    - echo quit >> upload.txt
    - ftp -A -s:upload.txt 127.0.0.1
  tags:
    - windows64
    - visual-studio-2022
  artifacts:
    name: HIT_64_Debug_%CI_COMMIT_REF_SLUG%_%CI_COMMIT_SHA%
    when: on_success
    expire_in: 1 weeks
    paths:
      - Debug/
build-windows-x64-release:
  stage: build
  script:
    - invoke-expression "& 'C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\Launch-VsDevShell.ps1'"
    - vcpkg.exe integrate install
    - msbuild /m /nr:false HRTImagingTool.sln /p:Platform=x64 /p:Configuration=Release
    - invoke-expression "& 'C:\Program Files\7-Zip\7z.exe' a ${CI_PROJECT_NAME}_${CI_COMMIT_REF_NAME}_${CI_COMMIT_SHORT_SHA}_${CI_PIPELINE_ID}_${CI_JOB_ID}_Release.7z Release"
    - echo "put ${CI_PROJECT_NAME}_${CI_COMMIT_REF_NAME}_${CI_COMMIT_SHORT_SHA}_${CI_PIPELINE_ID}_${CI_JOB_ID}_Release.7z" > upload.txt
    - echo quit >> upload.txt
    - ftp -A -s:upload.txt 127.0.0.1
  tags:
    - windows64
    - visual-studio-2022
  artifacts:
    name: HIT_64_Release_%CI_COMMIT_REF_SLUG%_%CI_COMMIT_SHA%
    when: on_success
    expire_in: 1 weeks
    paths:
      - Release/

deploy-windows-x64-release:
  needs: 
    - job: "build-windows-x64-release"
      artifacts: true
  stage: deploy
  script:
    - echo ${CI_API_V4_URL}
    - echo ${CI_PROJECT_ID}
    - echo ${CI_COMMIT_REF_NAME}
    - echo ${CI_COMMIT_TAG}
#    - "C:\\gitlab-runner\\curl-8.14.1_3-win64-mingw\\bin\\curl.exe --location --header  \"DEPLOY-TOKEN: ${DEPLOY_TOKEN}\" --upload-file Release/HITgui.exe \"https://gitlab.kit.edu/api/v4/projects/${CI_PROJECT_ID}/packages/generic/HIT/${CI_COMMIT_REF_NAME}/HITgui.exe\""
    - "C:\\gitlab-runner\\curl-8.14.1_3-win64-mingw\\bin\\curl.exe --location --header \"JOB-TOKEN: ${CI_JOB_TOKEN}\" --upload-file Release/HITgui.exe \"${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/HIT/${CI_COMMIT_TAG}/HITgui.exe\""
  tags:
    - windows64
    - visual-studio-2022
  only:
    - tags

